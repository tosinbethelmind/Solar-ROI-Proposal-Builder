<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 50" width="160" height="50">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
  </defs>
  <rect width="160" height="50" rx="8" fill="#1E293B" />
  
  <g transform="translate(12, 12)">
    <!-- Solar panel grid icon -->
    <rect x="0" y="0" width="26" height="26" rx="3" fill="none" stroke="url(#sunGrad)" stroke-width="2" />
    <line x1="13" y1="0" x2="13" y2="26" stroke="url(#sunGrad)" stroke-width="1.5" />
    <line x1="0" y1="13" x2="26" y2="13" stroke="url(#sunGrad)" stroke-width="1.5" />
    <line x1="0" y1="6.5" x2="26" y2="6.5" stroke="url(#sunGrad)" stroke-width="1" stroke-dasharray="1,1" />
    <line x1="0" y1="19.5" x2="26" y2="19.5" stroke="url(#sunGrad)" stroke-width="1" stroke-dasharray="1,1" />
  </g>
  
  <!-- Typography -->
  <text x="48" y="24" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="1">VERTEX SOLAR</text>
  <text x="48" y="36" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="7" font-weight="800" letter-spacing="2">TIER 1 PARTNER</text>
</svg>
